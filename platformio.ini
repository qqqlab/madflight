;============================================================
; madflight PlatformIO Project Configuration File
;
; For madflight documentation see:
; https://madflight.com
;
; For PlatformIO documentation see:
; https://docs.platformio.org/page/projectconf.html
;============================================================

; SETUP - Copy ONE main.cpp and madflight_config.h from the examples directory to the src directory
; or create 'src/main.cpp' with one line: #include "../examples/00.HelloWorld/main.cpp"

[platformio]
extra_configs = platformio_custom.ini
; Store personal environments into separate file platformio_custom.ini. This file is gitignored.
; Or uncomment ONE line to set the default env to compile, instead of "all environments"
;default_envs = ESP32
;default_envs = ESP32-S3
;default_envs = RP2040
;default_envs = RP2350A
;default_envs = RP2350B
;default_envs = STM32F411
;default_envs = STM32F405
;default_envs = STM32H743
;default_envs = madflight-FC2 ;ESP32-S3
;default_envs = madflight-FC3 ;RP2350B
;default_envs = madflight-FC3v2 ;RP2350B
;default_envs = stampfly ;ESP32-S3

[env]
; Default monitor speed for madflight is 115200
monitor_speed = 115200
monitor_echo = yes


;============================================================
; ESP32 TARGETS
;============================================================

[env_esp32_base]
framework = arduino
monitor_filters = esp32_exception_decoder
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
; The line above pulls the last stable pioarduino package release, alternatives are:
; Arduino core 3.3.9 based on IDF 5.5.4:
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
; Arduino core 3.1.1 based on IDF 5.3.2.241224:
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
; Arduino core 2.0.17 based on IDF 4.4.7: (not recommended)
;platform = espressif32 

[env:ESP32]
extends = env_esp32_base
board = esp32dev

[env:ESP32-S3]
extends = env_esp32_base
board = esp32-s3-devkitc-1 ;8MB flash, no psram
;board = esp32-s3-fh4r2 ;4MB flash, 2MB psram
;board = esp32-s3-devkitm-1 ;8MB flash, no psram
build_flags =
    -D ARDUINO_USB_MODE=1 ;1=USB HW Serial CDC, 0=USB OTG (do not use)
    -D ARDUINO_USB_CDC_ON_BOOT=1 ;enable CDC


;============================================================
; RP2040/RP2350 TARGETS
;============================================================

; Note: RP2040/RP2350 is not merged into mainline PlatformIO, see 
; https://arduino-pico.readthedocs.io/en/latest/platformio.html
; on Windows you need to enable long path names, see above link for instructions
; on Windows you need to use Zadig to enable uploading

[env_rp2_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_FREERTOS ; Required: Enable FreeRTOS
;    -D USE_TINYUSB                          ; Optional but not recommended: It adds USB SDCARD mass storage, but USB Serial does not work nicely with USE_TINYUSB

; Use arduino-pico version 5 or later. A fixed version is used here, not #master, to prevent long downloads each time the source repository is updated
platform_packages = framework-arduinopico@https://github.com/earlephilhower/arduino-pico.git#5.6.1

; Optional: Debugprobe debugger - see Appendix A "Getting started with Raspberry Pi Pico-series"
;debug_tool = cmsis-dap
;upload_protocol = cmsis-dap
;debug_speed = 30000
;build_type = debug

[env:RP2040]
extends = env_rp2_base
board = pico

[env:RP2350A]
extends = env_rp2_base
board = rpipico2

[env:RP2350B]
extends = env_rp2_base
board = solderparty_rp2350_stamp_xl


;============================================================
; STM32 TARGETS
;============================================================

[env_stm32_base]
platform = ststm32
framework = arduino
lib_deps = 
    ${env.lib_deps}
    stm32duino/STM32duino FreeRTOS
build_flags =
    -D SERIAL_RX_BUFFER_SIZE=256
    -D SERIAL_TX_BUFFER_SIZE=256
    -D MF_HACK_STM32_INTERRUPT_PRIORITY=1

[env:STM32F411] ;STM32F411CE (100Mhz, 512kB flash, 128kB RAM)
extends = env_stm32_base
board = blackpill_f411ce

[env:STM32F405] ;STM32F405RGT6 (168Mhz, 1MB flash, 128kB RAM)
extends = env_stm32_base
board = genericSTM32F405RG
board_build.mcu = stm32f405rgt6
board_build.f_cpu = 168000000L

[env:STM32H743] ;STM32H743ZI (480Mhz, 2MB flash, 1MB RAM)
extends = env_stm32_base
board = genericSTM32H743ZI
board_build.f_cpu = 480000000L 


;============================================================
; TARGETS FOR FLIGHT CONTROLLER BOARDS / COMPLETE DRONES
;============================================================

[env:madflight-FC2]
extends = env:ESP32-S3
board = esp32-s3-fh4r2 ;4MB flash, 2MB psram
build_flags =
  ${env:ESP32-S3.build_flags}
  -D MF_BOARD_OVERRIDE=\"brd/madflight_FC2.h\"

[env:stampfly]
extends = env:ESP32-S3
board = esp32-s3-devkitc-1 ;8MB flash, no psram
build_flags =
  ${env:ESP32-S3.build_flags}
  -D MF_BOARD_OVERRIDE=\"brd/stampfly.h\"

[env:madflight-FC3]
extends = env:RP2350B
build_flags =
  ${env:RP2350B.build_flags}
  -D MF_BOARD_OVERRIDE=\"brd/madflight_FC3.h\"

[env:madflight-FC3v2]
extends = env:RP2350B
build_flags =
  ${env:RP2350B.build_flags}
  -D MF_BOARD_OVERRIDE=\"brd/madflight_FC3v2.h\"